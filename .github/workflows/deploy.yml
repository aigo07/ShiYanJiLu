name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  cloudbase-backend:
    name: Deploy CloudBase backend
    runs-on: ubuntu-latest
    env:
      TENCENTCLOUD_SECRETID: ${{ secrets.TENCENTCLOUD_SECRETID }}
      TENCENTCLOUD_SECRETKEY: ${{ secrets.TENCENTCLOUD_SECRETKEY }}
      CLOUDBASE_ENV_ID: ${{ secrets.CLOUDBASE_ENV_ID }}
      CLOUDBASE_REGION: ${{ secrets.CLOUDBASE_REGION }}
      BOOTSTRAP_ADMIN_EMAILS: ${{ secrets.BOOTSTRAP_ADMIN_EMAILS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Check CloudBase secrets
        run: |
          test -n "$TENCENTCLOUD_SECRETID" || { echo "::error::Missing TENCENTCLOUD_SECRETID"; exit 1; }
          test -n "$TENCENTCLOUD_SECRETKEY" || { echo "::error::Missing TENCENTCLOUD_SECRETKEY"; exit 1; }
          test -n "$CLOUDBASE_ENV_ID" || { echo "::error::Missing CLOUDBASE_ENV_ID"; exit 1; }

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Seed CloudBase collections
        working-directory: backend
        run: npm run seed

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli

      - name: Login CloudBase CLI
        run: tcb login --apiKeyId "$TENCENTCLOUD_SECRETID" --apiKey "$TENCENTCLOUD_SECRETKEY"

      - name: Deploy CloudBase function
        working-directory: backend
        run: tcb fn deploy shiyanjilu-api -e "$CLOUDBASE_ENV_ID" --yes

  cloudbase-hosting:
    name: Build and deploy CloudBase hosting
    runs-on: ubuntu-latest
    needs: cloudbase-backend
    env:
      TENCENTCLOUD_SECRETID: ${{ secrets.TENCENTCLOUD_SECRETID }}
      TENCENTCLOUD_SECRETKEY: ${{ secrets.TENCENTCLOUD_SECRETKEY }}
      CLOUDBASE_ENV_ID: ${{ secrets.CLOUDBASE_ENV_ID }}
      VITE_CLOUDBASE_ENV_ID: ${{ secrets.VITE_CLOUDBASE_ENV_ID }}
      VITE_CLOUDBASE_REGION: ${{ secrets.VITE_CLOUDBASE_REGION }}
      VITE_CLOUDBASE_ACCESS_KEY: ${{ secrets.VITE_CLOUDBASE_ACCESS_KEY }}
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      VITE_CLOUDBASE_FUNCTION_NAME: ${{ secrets.VITE_CLOUDBASE_FUNCTION_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Check CloudBase and frontend secrets
        run: |
          test -n "$TENCENTCLOUD_SECRETID" || { echo "::error::Missing TENCENTCLOUD_SECRETID"; exit 1; }
          test -n "$TENCENTCLOUD_SECRETKEY" || { echo "::error::Missing TENCENTCLOUD_SECRETKEY"; exit 1; }
          test -n "$CLOUDBASE_ENV_ID" || { echo "::error::Missing CLOUDBASE_ENV_ID"; exit 1; }
          test -n "$VITE_CLOUDBASE_ENV_ID" || { echo "::error::Missing VITE_CLOUDBASE_ENV_ID"; exit 1; }
          test -n "$VITE_CLOUDBASE_ACCESS_KEY" || { echo "::error::Missing VITE_CLOUDBASE_ACCESS_KEY"; exit 1; }
          test -n "$VITE_API_BASE_URL" || { echo "::error::Missing VITE_API_BASE_URL"; exit 1; }

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli

      - name: Login CloudBase CLI
        run: tcb login --apiKeyId "$TENCENTCLOUD_SECRETID" --apiKey "$TENCENTCLOUD_SECRETKEY"

      - name: Deploy CloudBase static hosting
        working-directory: frontend
        run: tcb hosting deploy dist -e "$CLOUDBASE_ENV_ID" --yes
