services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: shiyanjilu
      POSTGRES_USER: shiyanjilu
      POSTGRES_PASSWORD: shiyanjilu
    ports:
      - "5432:5432"
    volumes:
      - shiyanjilu_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shiyanjilu -d shiyanjilu"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./backend
    environment:
      # Connect to the dockerized Postgres (service name: db)
      DATABASE_URL: postgresql+psycopg://shiyanjilu:shiyanjilu@db:5432/shiyanjilu
      # Fixed 30-minute sessions unless overridden
      SESSION_TTL_SECONDS: "1800"
      # In production behind HTTPS, set COOKIE_SECURE=true and configure domain/samesite as needed
      COOKIE_SECURE: "false"
      COOKIE_SAMESITE: "lax"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  web:
    build:
      context: ./frontend
    depends_on:
      - api
    ports:
      - "8080:80"

  loki:
    image: grafana/loki:2.9.8
    command: -config.file=/etc/loki/config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./ops/logging/loki-config.yml:/etc/loki/config.yml:ro
      - shiyanjilu_loki:/loki
    profiles: ["logging"]

  promtail:
    image: grafana/promtail:2.9.8
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./ops/logging/promtail-config.yml:/etc/promtail/config.yml:ro
      - ./backend/logs:/var/log/shiyanjilu:ro
    depends_on:
      - loki
    profiles: ["logging"]

  grafana:
    image: grafana/grafana:10.4.6
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - ./ops/logging/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - shiyanjilu_grafana:/var/lib/grafana
    depends_on:
      - loki
    profiles: ["logging"]

volumes:
  shiyanjilu_pgdata:
  shiyanjilu_loki:
  shiyanjilu_grafana:

